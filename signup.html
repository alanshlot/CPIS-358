<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signup - GameZone Store</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h1 {
            color: darkblue;
        }

        .signup-page {
            background-color: #f0f4ff;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .signup-page img {
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid darkblue;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>🎮 GameZone 🎮</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign up</a>
        <a href="about.html">About us</a>
    </nav>

    <div class="signup-page">

        <!-- Image on signup page (required: one image per page) -->
        <img src="images/logo.png" width="120" alt="GameZone Logo">

        <h2 style="color: darkblue; margin-bottom: 20px;">Create a New Account</h2>

        <!-- Signup Form -->
        <div class="card" style="width: 400px; background-color: #111; border-color: rgb(15, 0, 155);">
            <form>
                <div class="form-group">
                    <label>Full Name:</label><br>
                    <input type="text" placeholder="Enter your full name" required class="input-field">
                </div>        
                <br>
                <div class="form-group">
                    <label>Email:</label><br>
                    <input type="email" placeholder="Enter your email" required class="input-field">
                </div>
                <br>
                <div class="form-group">
                    <label>Password:</label><br>
                    <input type="password" placeholder="Create a password" required class="input-field">
                </div>
                <br>
                <div class="form-group">
                    <label>Confirm Password:</label><br>
                    <input type="password" placeholder="Repeat your password" required class="input-field">
                </div>
                <br>
                <input type="submit" value="Create Account" class="btn">
            </form>

            <br>
            <p style="text-align:center; color:#ffffff;">Already have an account? <a href="login.html" style="color:rgb(69, 88, 255);">Login here</a></p>
        </div>

    </div>

    <!-- Footer -->
    <footer style="background:#111; color:#aaa; text-align:center; padding: 16px; margin-top: 30px;">
        <p>© 2026 GameZone Store. All rights reserved.</p>
    </footer>

</body>
</html>
