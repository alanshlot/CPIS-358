<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <title>Login - GameZone Store</title>
 
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
 
    <!-- Internal CSS (required by rubric) -->
    <style>
        h1 {
            color: darkblue;
        }
 
        .login-page {
            background-color: #f0f4ff;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }
 
        .login-page img {
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid darkblue;
        }
    </style>
</head>
 
<body>
 
    <!-- Header -->
    <header>
        <h1>🎮 GameZone 🎮</h1>
    </header>
 
    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign up</a>
        <a href="about.html">About us</a>
    </nav>
 
    <div class="login-page">
 
        <!-- Image on login page (required: one image per page) -->
        <img src="images/logo.png" width="120" alt="GameZone Logo">
 
        <h2 style="color: darkblue; margin-bottom: 20px;">Login to Your Account</h2>
 
        <!-- Login Form -->
        <div class="card" style="width: 400px; background-color: #111; border-color: rgb(15, 0, 155);">
            <form>
                <div class="form-group">
                    <label>Email:</label><br>
                    <input type="email" placeholder="Enter your email" required class="input-field">
                </div>
                <br>
                <div class="form-group">
                    <label>Password:</label><br>
                    <input type="password" placeholder="Enter your password" required class="input-field">
                </div>
                <br>
                <input type="submit" value="Login" class="btn">
            </form>
 
            <br>
            <p style="text-align:center; color:#fffdfd;">Don't have an account? <a href="signup.html" style="color: rgb(69, 88, 255);">Sign up here</a></p>
        </div>                 
 
    </div>
 
    <!-- Footer -->
    <footer style="background:#111; color:#aaa; text-align:center; padding: 16px; margin-top: 30px;">
        <p>© 2026 GameZone Store. All rights reserved.</p>
    </footer>
 

    
</body>
</html>
